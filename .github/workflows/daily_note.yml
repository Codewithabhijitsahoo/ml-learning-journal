name: Daily ML Learning Note Generator

on:
  schedule:
    # Runs at 00:00 UTC every day (approx. 5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force generation even if a note was already generated today'
        required: false
        type: boolean
        default: false
      model:
        description: 'Gemini model to use'
        required: false
        type: string
        default: 'gemini-2.5-flash'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history to ensure proper versioning and avoid push conflicts
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate and Commit Note 1
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.5-flash' }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python generate_note.py $FORCE_FLAG

          git config --local user.email "Codewithabhijitsahoo@users.noreply.github.com"
          git config --local user.name "Codewithabhijitsahoo"
          git add notes/
          
          if git diff --cached --quiet; then
            echo "No new changes for Note 1."
          else
            git commit -m "docs: Auto-generate daily learning note (Part 1)"
            if ! git pull --rebase origin main 2>/dev/null && ! git pull --rebase origin master 2>/dev/null; then
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase origin main || git pull --no-rebase origin master
            fi
            git push origin HEAD
          fi

      - name: Generate and Commit Note 2
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.5-flash' }}
        run: |
          # Wait 10 seconds to avoid rapid consecutive requests
          sleep 10
          
          # Force is only used for manual runs, but for Note 2 we always force if manual force was set
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python generate_note.py $FORCE_FLAG

          git config --local user.email "Codewithabhijitsahoo@users.noreply.github.com"
          git config --local user.name "Codewithabhijitsahoo"
          git add notes/
          
          if git diff --cached --quiet; then
            echo "No new changes for Note 2."
          else
            git commit -m "docs: Auto-generate daily learning note (Part 2)"
            if ! git pull --rebase origin main 2>/dev/null && ! git pull --rebase origin master 2>/dev/null; then
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase origin main || git pull --no-rebase origin master
            fi
            git push origin HEAD
          fi

      - name: Generate and Commit Note 3
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.5-flash' }}
        run: |
          # Wait 10 seconds to avoid rapid consecutive requests
          sleep 10
          
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python generate_note.py $FORCE_FLAG

          git config --local user.email "Codewithabhijitsahoo@users.noreply.github.com"
          git config --local user.name "Codewithabhijitsahoo"
          git add notes/
          
          if git diff --cached --quiet; then
            echo "No new changes for Note 3."
          else
            git commit -m "docs: Auto-generate daily learning note (Part 3)"
            if ! git pull --rebase origin main 2>/dev/null && ! git pull --rebase origin master 2>/dev/null; then
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase origin main || git pull --no-rebase origin master
            fi
            git push origin HEAD
          fi

      - name: Generate and Commit Note 4
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.5-flash' }}
        run: |
          # Wait 10 seconds to avoid rapid consecutive requests
          sleep 10
          
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python generate_note.py $FORCE_FLAG

          git config --local user.email "Codewithabhijitsahoo@users.noreply.github.com"
          git config --local user.name "Codewithabhijitsahoo"
          git add notes/
          
          if git diff --cached --quiet; then
            echo "No new changes for Note 4."
          else
            git commit -m "docs: Auto-generate daily learning note (Part 4)"
            if ! git pull --rebase origin main 2>/dev/null && ! git pull --rebase origin master 2>/dev/null; then
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase origin main || git pull --no-rebase origin master
            fi
            git push origin HEAD
          fi

      - name: Generate and Commit Note 5
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ github.event.inputs.model || 'gemini-2.5-flash' }}
        run: |
          # Wait 10 seconds to avoid rapid consecutive requests
          sleep 10
          
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python generate_note.py $FORCE_FLAG

          git config --local user.email "Codewithabhijitsahoo@users.noreply.github.com"
          git config --local user.name "Codewithabhijitsahoo"
          git add notes/
          
          if git diff --cached --quiet; then
            echo "No new changes for Note 5."
          else
            git commit -m "docs: Auto-generate daily learning note (Part 5)"
            if ! git pull --rebase origin main 2>/dev/null && ! git pull --rebase origin master 2>/dev/null; then
              git rebase --abort 2>/dev/null || true
              git pull --no-rebase origin main || git pull --no-rebase origin master
            fi
            git push origin HEAD
          fi
